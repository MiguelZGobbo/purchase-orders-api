services:
  api:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URI: postgresql://purchase_user:purchase_pass@db:5432/purchase_orders

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: purchase_user
      POSTGRES_PASSWORD: purchase_pass
      POSTGRES_DB: purchase_orders
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U purchase_user -d purchase_orders"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
